version: '3.9'

services:
  # === PostgreSQL ===
  postgres:
    image: postgres:16-alpine
    container_name: msgr-postgres
    environment:
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger_pass
      POSTGRES_DB: messenger_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - msgr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger -d messenger_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Redis (для кэша JWT и сессий) ===
  redis:
    image: redis:7-alpine
    container_name: msgr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - msgr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  msgr-network:
    driver: bridge