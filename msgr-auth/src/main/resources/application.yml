server:
  port: 8081

spring:
  application:
    name: msgr-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/messenger_db
    username: messenger
    password: messenger_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # на старте можно поставить 'update' для авто-создания
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT конфигурация
jwt:
  secret: your-super-secret-key-change-in-production-min-256-bits-long!!!
  access-token-expiration: 3600      # 1 час (в секундах)
  refresh-token-expiration: 604800   # 7 дней

  # Redis для хранения refresh-токенов
  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    ru.vsu.cs: DEBUG