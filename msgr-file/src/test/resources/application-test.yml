spring:
  datasource:
    url: jdbc:h2:mem:msgr_file_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-minimum-256-bits-long-for-hmac-sha256-algorithm!!!

file:
  upload-dir: ${java.io.tmpdir}/msgr-file-test
  allowed-types: image/jpeg,image/png,application/pdf
  max-size: 536870912
