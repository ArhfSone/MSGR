server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: msgr-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**,/api/contacts/**

        - id: chat-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/chats/**

        - id: file-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/files/**

      # CORS для Flutter-клиента
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG